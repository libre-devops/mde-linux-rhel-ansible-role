- name: Wait for MDE daemon to become available
  command: mdatp health
  register: mde_health
  changed_when: false
  retries: 10
  delay: 5
  until: mde_health.rc == 0

- name: Show MDE health
  debug:
    var: mde_health.stdout_lines

- name: Ensure MDE is onboarded
  fail:
    msg: "MDE onboarding failed"
  when: mde_health.stdout is not search("org_id")