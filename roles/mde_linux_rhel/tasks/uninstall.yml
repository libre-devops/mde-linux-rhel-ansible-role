---
- name: Stop mdatp service if running
  service:
    name: mdatp
    state: stopped
  failed_when: false

- name: Disable mdatp service
  service:
    name: mdatp
    enabled: false
  failed_when: false

- name: Remove Defender for Endpoint package
  yum:
    name: mdatp
    state: absent

- name: Remove MDE configuration directory
  file:
    path: /etc/opt/microsoft/mdatp
    state: absent

- name: Remove MDE data directory
  file:
    path: /var/opt/microsoft/mdatp
    state: absent

- name: Remove Microsoft repo file
  file:
    path: /etc/yum.repos.d/microsoft-prod.repo
    state: absent