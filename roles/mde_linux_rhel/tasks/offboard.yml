---
# ============================================================
# 📦 Ensure fact is set
# ============================================================
- name: Default offboarding status
  set_fact:
    mde_offboard_success: false

# ============================================================
# 📁 Ensure config path
# ============================================================

- name: Ensure MDE config directory exists
  file:
    path: /etc/opt/microsoft/mdatp
    state: directory
    mode: '0755'

# ============================================================
# 📦 Deploy offboarding package
# ============================================================

- name: Copy offboarding file
  copy:
    src: "offboarding/{{ mde_offboarding_file }}"
    dest: "{{ mde_offboarding_remote_path }}"
    mode: '0600'
  notify: restart mdatp

# ============================================================
# 🔍 Pre-check (for visibility only)
# ============================================================

- name: Check onboarding state (before)
  command: mdatp health --field org_id
  register: mde_org_before
  changed_when: false
  failed_when: false

- name: Extract org_id (before)
  set_fact:
    mde_org_before_clean: >-
      {{
        mde_org_before.stdout_lines
        | select('match', '^".*"$')
        | list
        | first
        | default('""')
        | regex_replace('"', '')
      }}

- name: Show org_id before offboarding
  debug:
    msg: "Before offboarding org_id: '{{ mde_org_before_clean }}'"

# ============================================================
# 🔄 Trigger offboarding (CRITICAL)
# ============================================================

- name: Flush handlers to trigger MDE restart
  meta: flush_handlers

# ============================================================
# ⏳ Wait for offboarding to take effect
# ============================================================

- name: Wait for org_id to clear
  command: mdatp health --field org_id
  register: mde_org_after
  changed_when: false
  failed_when: false
  retries: 10
  delay: 5
  until: >
    (
      mde_org_after.stdout_lines
      | select('match', '^".*"$')
      | list
      | first
      | default('""')
      | regex_replace('"', '')
    ) == ""

# ============================================================
# 🔍 Post-check
# ============================================================

- name: Extract org_id (after)
  set_fact:
    mde_org_after_clean: >-
      {{
        mde_org_after.stdout_lines
        | select('match', '^".*"$')
        | list
        | first
        | default('""')
        | regex_replace('"', '')
      }}

- name: Show org_id after offboarding
  debug:
    msg: "After offboarding org_id: '{{ mde_org_after_clean }}'"

# ============================================================
# ✅ Final assertion
# ============================================================

- name: Ensure MDE is offboarded
  assert:
    that:
      - mde_org_after_clean == ""
    fail_msg: "MDE offboarding failed"
    success_msg: "MDE successfully offboarded"

- name: Mark offboarding success
  set_fact:
    mde_offboard_success: true