- name: Ensure MDE config directory exists
  file:
    path: /etc/opt/microsoft/mdatp
    state: directory
    mode: '0755'

- name: Copy onboarding file
  copy:
    src: "onboarding/{{ mde_onboarding_file }}"
    dest: "{{ mde_onboarding_remote_path }}"
    mode: '0600'

- name: Check onboarding state
  command: mdatp health --field org_id
  register: mde_org
  changed_when: false
  failed_when: false

- name: Run MDE onboarding if not onboarded
  command: >
    mdatp onboarding --input {{ mde_onboarding_remote_path }}
  when:
    - mde_org.stdout | length == 0 or mde_force_onboarding | default(false)

- name: Debug onboarding org_id
  debug:
    var: mde_org.stdout

# 🔑 Ensure restart happens if config changed
- name: Flush handlers before validation
  meta: flush_handlers

- name: Validate managed config contains tags
  command: cat /etc/opt/microsoft/mdatp/managed/mdatp_managed.json
  register: mde_config_file
  changed_when: false

- name: Ensure expected tags are present in config
  assert:
    that:
      - item.value in mde_config_file.stdout
  loop: "{{ mde_tags }}"